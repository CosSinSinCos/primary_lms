{% extends "base.html" %}
{% block title %}{{ '编辑错题' if error else '新增错题' }} · 小学自学系统{% endblock %}
{% block content %}
<h1>{{ '编辑错题' if error else '新增错题' }}</h1>
<form class="form" method="post">
  <div class="row">
    <label>孩子
      <select name="child_id" required>
        {% for cid, cname in children %}
        <option value="{{ cid }}" {% if error and error.child_id == cid %}selected{% endif %}>{{ cname }}</option>
        {% endfor %}
      </select>
    </label>
    <label>科目
      <select name="subject" id="subject" required onchange="updateKnowledgeLines()">
        <option value="math" {% if error and error.subject == 'math' %}selected{% endif %}>数学</option>
        <option value="chinese" {% if error and error.subject == 'chinese' %}selected{% endif %}>语文</option>
      </select>
    </label>
    <label>年级
      <select name="grade" required>
        {% for g in range(1, 7) %}
        <option value="{{ g }}" {% if error and error.grade == g %}selected{% endif %}>{{ g }}</option>
        {% endfor %}
      </select>
    </label>
  </div>

  <div class="row">
    <label>单元
      <input type="text" name="unit" value="{{ error.unit if error else '' }}" placeholder="例：一上-第三单元" required>
    </label>
    <label>知识线
      <select name="knowledge_line" id="knowledge_line" required>
        {% for k, v in knowledge_lines['math'] %}
        <option value="{{ k }}" data-subject="math" {% if error and error.knowledge_line == k %}selected{% endif %}>{{ k }} — {{ v }}</option>
        {% endfor %}
        {% for k, v in knowledge_lines['chinese'] %}
        <option value="{{ k }}" data-subject="chinese" {% if error and error.knowledge_line == k %}selected{% endif %}>{{ k }} — {{ v }}</option>
        {% endfor %}
      </select>
    </label>
  </div>

  <div class="row">
    <label>知识节点
      <input type="text" name="knowledge_node" value="{{ error.knowledge_node if error else '' }}" placeholder="例：20以内进位加法" required>
    </label>
    <label>错误类型
      <select name="error_type" required>
        {% for t in error_types %}
        <option value="{{ t }}" {% if error and error.error_type == t %}selected{% endif %}>{{ t }}</option>
        {% endfor %}
      </select>
    </label>
  </div>

  <div class="row">
    <label>来源
      <input type="text" name="source" value="{{ error.source if error else '' }}" placeholder="课本P12 / 试卷 / 练习册">
    </label>
    <label>熟练度
      <select name="proficiency">
        {% for p in range(6) %}
        <option value="{{ p }}" {% if error and error.proficiency == p %}selected{% endif %}>{{ p }} ★</option>
        {% endfor %}
      </select>
    </label>
  </div>

  <div class="row">
    <button type="submit" class="btn">保存</button>
    <a href="{{ url_for('errors_list') }}" class="btn btn-ghost">取消</a>
  </div>
</form>
{% endblock %}
