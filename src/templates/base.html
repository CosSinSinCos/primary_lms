<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}小学自学系统{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <a class="brand" href="{{ url_for('index') }}">小学自学系统</a>
      <div class="side-group">语文</div>
      <nav class="main-menu">
        <a class="menu-item {% if request.endpoint == 'roadmap' and request.args.get('subject') == 'chinese' %}active{% endif %}" href="{{ url_for('roadmap', subject='chinese') }}">语文知识导图</a>
        <a class="menu-item {% if request.endpoint == 'errors_list' and request.args.get('subject') == 'chinese' %}active{% endif %}" href="{{ url_for('errors_list', subject='chinese') }}">语文错题集</a>
        <a class="menu-item {% if request.endpoint == 'chinese' %}active{% endif %}" href="{{ url_for('chinese') }}">语文生字</a>
        <a class="menu-item {% if request.endpoint == 'recite' %}active{% endif %}" href="{{ url_for('recite') }}">文章背诵</a>
      </nav>
      <div class="side-group">数学</div>
      <nav class="main-menu">
        <a class="menu-item {% if request.endpoint == 'roadmap' and request.args.get('subject') == 'math' %}active{% endif %}" href="{{ url_for('roadmap', subject='math') }}">数学知识导图</a>
        <a class="menu-item {% if request.endpoint == 'mathcalc' %}active{% endif %}" href="{{ url_for('mathcalc') }}">数学计算</a>
        <a class="menu-item {% if request.endpoint == 'errors_list' and request.args.get('subject') == 'math' %}active{% endif %}" href="{{ url_for('errors_list', subject='math') }}">数学错题集</a>
        <a class="menu-item {% if request.endpoint == 'strategy' %}active{% endif %}" href="{{ url_for('strategy') }}">解题思路</a>
      </nav>
    </aside>
    <main class="container">
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="flash">
          {% for m in messages %}<div>{{ m }}</div>{% endfor %}
        </div>
      {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>
  </div>
  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
