<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>解题思路 · 小学自学系统</title>
  <link rel="stylesheet" href="src/static/css/style.css">
</head>
<body data-page="strategy">
  <div class="layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="container">
      <section id="board" class="board-wrap" aria-live="polite">
        <div class="blackboard">
          <div class="board-hint">点击黑板下方知识点，在黑板上展现。</div>
          <div id="board-empty" class="board-empty">
            👆 点下面的解题策略，看看它适合什么题、怎么想～
          </div>
          <div id="board-content" class="board-content" hidden>
            <div class="board-lesson-tag" id="board-tag">🧠 解题策略</div>
            <h2 id="board-title" class="board-title"></h2>
            <div id="board-sections"></div>
          </div>
        </div>
      </section>

      <div class="strategy-grid" id="strategy-grid"></div>
    </main>
  </div>
  <script src="assets/site.js"></script>
</body>
</html>
